      <text class="white" x="70" y="104" font-size="39">Active List</text><text class="on" x="374" y="104" font-size="37">on</text>
      <text class="mint" x="20" y="176" font-size="42">+</text><text class="white" x="70" y="176" font-size="39">Config</text><text class="muted" x="374" y="176" font-size="37">off</text>
