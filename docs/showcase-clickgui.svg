      <rect class="header" x="4" y="4" width="432" height="50"/>
      <text class="white" x="220" y="42" text-anchor="middle" font-size="40">Combat</text>
      <text class="mint" x="20" y="104" font-size="42">+</text><text class="white" x="70" y="104" font-size="39">KillAura</text><text class="muted" x="374" y="104" font-size="37">off</text>
      <text class="white" x="70" y="176" font-size="39">NoKnockback</text><text class="muted" x="374" y="176" font-size="37">off</text>
