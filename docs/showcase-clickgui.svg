      <text class="mint" x="20" y="464" font-size="42">+</text><text class="white" x="70" y="464" font-size="39">JumpHeight</text><text class="muted" x="374" y="464" font-size="37">off</text>
      <text class="white" x="70" y="536" font-size="39">NoSlow</text><text class="muted" x="374" y="536" font-size="37">off</text>
    </g>

