      <rect class="header" x="4" y="4" width="432" height="50"/>
      <text class="white" x="220" y="42" text-anchor="middle" font-size="40">Render</text>
      <text class="white" x="70" y="104" font-size="39">Player ESP</text><text class="muted" x="374" y="104" font-size="37">off</text>
      <text class="mint" x="20" y="176" font-size="42">+</text><text class="white" x="70" y="176" font-size="39">Chest ESP</text><text class="muted" x="374" y="176" font-size="37">off</text>
      <text class="white" x="70" y="248" font-size="39">XRay</text><text class="muted" x="374" y="248" font-size="37">off</text>
      <text class="white" x="70" y="320" font-size="39">HealthBars</text><text class="muted" x="374" y="320" font-size="37">off</text>
      <text class="white" x="70" y="392" font-size="39">FullBright</text><text class="muted" x="374" y="392" font-size="37">off</text>
